<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a58ca;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)"/>
  <!-- Document icon -->
  <g transform="translate(130, 80)">
    <!-- Paper -->
    <path d="M0 40 Q0 0 40 0 L160 0 L220 60 L220 312 Q220 352 180 352 L40 352 Q0 352 0 312 Z" fill="white"/>
    <!-- Folded corner -->
    <path d="M160 0 L160 60 L220 60 Z" fill="#e0e0e0"/>
    <!-- Lines on paper -->
    <rect x="35" y="90" width="150" height="12" rx="6" fill="#0d6efd" opacity="0.3"/>
    <rect x="35" y="120" width="120" height="12" rx="6" fill="#0d6efd" opacity="0.3"/>
    <rect x="35" y="150" width="150" height="12" rx="6" fill="#0d6efd" opacity="0.3"/>
    <rect x="35" y="180" width="100" height="12" rx="6" fill="#0d6efd" opacity="0.3"/>
    <!-- Dollar sign -->
    <g transform="translate(110, 230)">
      <circle cx="50" cy="50" r="45" fill="#28a745" opacity="0.2"/>
      <text x="50" y="70" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#28a745" text-anchor="middle">$</text>
    </g>
  </g>
</svg>
